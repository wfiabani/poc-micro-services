apiVersion: v1
kind: Service
metadata:
  name: kafka-host-service
  namespace: default
spec:
  ports:
    - port: 9092
      targetPort: 9092
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kafka-host-service
  namespace: default
subsets:
  - addresses:
      - ip: 192.168.49.1
    ports:
      - port: 9092
